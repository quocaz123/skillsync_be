server:
  port: 8081
  servlet:
    context-path: /notification

spring:
  # Mặc định chạy local. Production bật bằng:
  # --spring.profiles.active=pro hoặc SPRING_PROFILES_ACTIVE=pro
  profiles:
    default: local

  # Fallback Kafka config (tránh lỗi placeholder nếu profile file không load vì lý do nào đó)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
    consumer:
      group-id: skillsync-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.skillsync.notification.dto.event"
        spring.json.use.type.headers: false
        max.poll.interval.ms: 900000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  thymeleaf:
    prefix: classpath:/templates/email/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

app:
  mail:
    sender-name: ${MAIL_SENDER_NAME:SkillSync}
    sender-email: ${MAIL_SENDER_EMAIL:${MAIL_USERNAME:}}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

kafka:
  topics:
    auth: skillsync.notification.auth
    session: skillsync.notification.session
    credit: skillsync.notification.credit
    skill: skillsync.notification.skill
    dlq: DLQ_EMAIL_TOPIC
