# Profile pro: Aiven Kafka (SASL_SSL + SCRAM-SHA-256)
# Trên Koyeb/Linux: hệ thống đã tin tưởng CA của Aiven → KAFKA_SSL_CA_CERT để rỗng là được.
# Windows local: set KAFKA_SSL_CA_CERT = nội dung file ca.pem (1 dòng trong .env bằng cách escape newline).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: skillsync-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.skillsync.notification.dto.event"
        spring.json.use.type.headers: false
        max.poll.interval.ms: 900000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    properties:
      sasl-username: ${KAFKA_SASL_USERNAME}
      sasl-password: ${KAFKA_SASL_PASSWORD}
      # Đường dẫn đến file ca.pem của Aiven — chỉ cần set khi chạy local Windows.
      # Koyeb/Linux: để rỗng (hệ thống đã trust CA này).
      ssl-ca-cert-path: ${KAFKA_SSL_CA_CERT_PATH:}

  thymeleaf:
    cache: true

app:
  frontend-url: ${FRONTEND_URL:https://skillsync.vercel.app}
