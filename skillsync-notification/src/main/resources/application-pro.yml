# Profile pro: Kafka PLAINTEXT (không dùng Aiven/SASL_SSL).
# Đặt KAFKA_BOOTSTRAP_SERVERS trỏ đến broker bạn tự quản (ví dụ VM/VPS) hoặc dùng localhost khi demo.
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: skillsync-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.skillsync.notification.dto.event"
        spring.json.use.type.headers: false
        max.poll.interval.ms: 900000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  thymeleaf:
    cache: true

app:
  frontend-url: ${FRONTEND_URL:https://skillsync.vercel.app}
