<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f6f7fb; color: #111827; }
        .container { max-width: 560px; margin: 0 auto; padding: 24px; }
        .card { background: white; border-radius: 14px; padding: 24px; border: 1px solid #e5e7eb; }
        .btn { display: inline-block; padding: 12px 16px; background: #6d28d9; color: white !important; text-decoration: none; border-radius: 10px; font-weight: 700; }
        .muted { color: #6b7280; font-size: 13px; line-height: 1.5; }
        .title { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <p class="title">Reset your password</p>
        <p class="muted">
            Hi <span th:text="${recipientName}">there</span>, use the 6-digit code below to reset the password for
            <strong th:text="${recipientEmail}">your email</strong>.
        </p>

        <p style="margin: 18px 0 14px;">
            <span style="font-size:28px;font-weight:900;letter-spacing:6px;padding:14px 16px;border-radius:12px;background:#f3f4f6;display:inline-block;"
                  th:text="${resetCode}">123456</span>
        </p>

        <p class="muted">
            This code expires soon. If you didn’t request a password reset, you can ignore this email.
        </p>
    </div>
    <p class="muted" style="text-align:center; margin-top: 12px;">
        © <span th:text="${#dates.year(#dates.createNow())}">2026</span> SkillSync
    </p>
</div>
</body>
</html>
