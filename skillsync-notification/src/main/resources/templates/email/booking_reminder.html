<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Reminder</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #FF9800;">⏰ Nhắc nhở phiên học sắp diễn ra</h2>
        <p>Chào <span th:text="${recipientName}">Bạn</span>,</p>
        <p>Phiên học của bạn với <strong th:text="${counterpartName}">đối tác</strong> sắp diễn ra.</p>
        <p><strong>Thời gian:</strong> <span th:text="${sessionTime}">thời gian</span></p>
        <p><strong>Link tham gia:</strong> <a th:href="${sessionLink}" target="_blank">Truy cập phòng học</a></p>
        <p>Vui lòng chuẩn bị và tham gia đúng giờ nhé!</p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 0.9em; color: #888;">Từ đội ngũ SkillSync</p>
    </div>
</body>
</html>
