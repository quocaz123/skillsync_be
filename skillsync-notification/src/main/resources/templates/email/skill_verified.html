<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kỹ năng đã được xác minh</title>
</head>
<body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;">
<div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#ffffff;border-radius:12px;padding:24px;border:1px solid #e7e9f2;">
        <h2 style="margin:0 0 12px 0;color:#111827;">Kỹ năng của bạn đã được xác minh</h2>

        <p style="margin:0 0 12px 0;color:#374151;line-height:1.6;">
            Chào <b th:text="${recipientName}">bạn</b>,
        </p>

        <p style="margin:0 0 12px 0;color:#374151;line-height:1.6;">
            Kỹ năng <b th:text="${skillName}">Kỹ năng</b> đã được duyệt. Bạn có thể bắt đầu nhận học viên ngay.
        </p>

        <a th:if="${manageUrl != null}" th:href="${manageUrl}"
           style="display:inline-block;background:#16a34a;color:#ffffff;text-decoration:none;padding:12px 16px;border-radius:10px;font-weight:600;">
            Quản lý kỹ năng dạy
        </a>

        <p style="margin:16px 0 0 0;color:#6b7280;line-height:1.6;font-size:12px;">
            Email này được gửi tự động từ SkillSync.
        </p>
    </div>
</div>
</body>
</html>
