<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail Test</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; padding: 24px; color: #111827; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; max-width: 520px; margin: 0 auto; }
        .title { font-weight: 800; font-size: 18px; margin: 0 0 8px; }
        .muted { color: #6b7280; font-size: 13px; }
        code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
    </style>
</head>
<body>
<div class="card">
    <p class="title">SkillSync mail test</p>
    <p class="muted">If you received this email, SMTP is configured correctly.</p>
    <p class="muted">Time: <code th:text="${timestamp}">now</code></p>
</div>
</body>
</html>
