version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 2 listeners:
      # - INTERNAL: các container trong compose gọi bằng kafka:29092
      # - EXTERNAL: máy host (Windows) gọi bằng localhost:9092 (nếu cần debug)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  skill_be:
    build:
      context: ./skill_be
    container_name: skill_be
    env_file:
      - ./skill_be/.env
    environment:
      # trong Docker: Kafka phải dùng listener INTERNAL
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    restart: unless-stopped

  skillsync-notification:
    build:
      context: ./skillsync-notification
    container_name: skillsync-notification
    env_file:
      - ./skillsync-notification/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    restart: unless-stopped