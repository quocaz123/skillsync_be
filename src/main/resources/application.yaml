server:
  port: 8080
  servlet:
    context-path: /skillsync

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false
        "[jdbc.lob.non_contextual_creation]": true

jwt:
  secret: ${JWT_SECRET}

app:
  cookie:
    secure: false
    same-site: Lax