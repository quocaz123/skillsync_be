# Bật profile này bằng: -Dspring.profiles.active=pro hoặc SPRING_PROFILES_ACTIVE=pro
# (Không khai báo spring.profiles.active trong file application-pro — Spring Boot báo lỗi.)
server:
  port: 8080
  servlet:
    context-path: /skillsync

spring:
  jackson:
    time-zone: Asia/Ho_Chi_Minh

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false
        "[jdbc.lob.non_contextual_creation]": true

  # ── Upstash Redis (TLS) ──────────────────────────────────
  # Upstash dùng port 6380 + TLS bắt buộc (khác local port 6379)
  data:
    redis:
      url: ${REDIS_URL}          # rediss://:<password>@<host>.upstash.io:6380
      ssl:
        enabled: true
      timeout: 3000ms

  # ── Kafka PLAINTEXT (không dùng Aiven/SASL_SSL) ─────────
  # Đặt KAFKA_BOOTSTRAP_SERVERS trỏ đến broker bạn tự quản.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        # Fail-fast để Kafka lỗi không làm treo request lâu
        delivery.timeout.ms: 10000
        request.timeout.ms: 3000
        max.block.ms: 2000
        retries: 0
    # Không dùng SASL/SSL

jwt:
  secret: ${JWT_SECRET}

app:
  timezone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}
  frontend-url: ${FRONTEND_URL:https://skillsync.vercel.app}
  # FE chạy Cloudflare Pages/Vercel và API ở domain khác → cookie cross-site cần SameSite=None
  cookie:
    secure: true
    same-site: None
    # Bắt buộc khi FE dùng SockJS qua ws.skillsync.sbs và API qua api.skillsync.sbs (cookie chung subdomain).
    domain: ${COOKIE_DOMAIN:}

  # CORS — chỉ từ env (skill_be/.env hoặc biến hệ thống). Không đặt URL cố định trong file này.
  # CORS_ALLOWED_ORIGINS=https://skillsync.pages.dev,https://skillsync.sbs
  # CORS_ALLOWED_ORIGIN_PATTERNS=https://*.skillsync.pages.dev
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}

cloudflare:
  r2:
    access-key: ${CLOUDFLARE_R2_ACCESS_KEY}
    secret-key: ${CLOUDFLARE_R2_SECRET_KEY}
    region: ${CLOUDFLARE_R2_REGION:auto}
    endpoint: ${CLOUDFLARE_R2_ENDPOINT_URL}
    bucket-name: ${CLOUDFLARE_R2_BUCKET}
    public-base-url: ${CLOUDFLARE_R2_PUBLIC_URL}

# ── Gemini ──────────────────────────────────────────────
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-3.1-flash-lite-preview
  temperature: 0.2
  max-output-tokens: 512
  retry:
    max-attempts: 0
    initial-delay-ms: 1500
  embedding-model: gemini-embedding-001
  embedding-dim: 1536

# ── Groq Cloud ───────────────────────────────────────────
groq:
  api-key: ${GROQ_API_KEY}
  model: llama-3.3-70b-versatile
  temperature: 0.2
  max-output-tokens: 768

# ── SkillSync AI tuning ──────────────────────────────────
skillsync:
  ai:
    enrich-reasons-enabled: true
    vector-search-enabled: true
    vector-search-threshold: 0.80
    vector-search-min-primary-results: 3
    session:
      ttl-minutes: 30
      max-recent-turns: 10
      summary-trigger-turns: 6

# ── ZEGO Video Call ──────────────────────────────────────
zego:
  app-id: ${ZEGO_APP_ID}
  server-secret: ${ZEGO_SERVER_SECRET}

# ── Notification Kafka Topics ────────────────────────────
kafka:
  topics:
    auth: skillsync.notification.auth
    session: skillsync.notification.session
    credit: skillsync.notification.credit
    skill: skillsync.notification.skill

